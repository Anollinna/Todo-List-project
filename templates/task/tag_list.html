{% extends 'base.html' %}

{% block content %}
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h1 class="mb-0">Tags</h1>
    <a href="{% url 'task:tag-create' %}" class="btn btn-primary">
      Add New Tag
    </a>
  </div>

  <div class="table-responsive">
    <table class="table table-striped table-bordered">
      <thead class="thead-light">
        <tr>
          <th>Name</th>
          <th>Update</th>
          <th>Delete</th>
        </tr>
      </thead>
      <tbody>
        {% for tag in tags %}
          <tr>
            <td>{{ tag.name }}</td>
            <td>
              <a href="{% url 'task:tag-update' tag.pk %}" class="btn btn-sm btn-outline-warning">
                Update
              </a>
            </td>
            <td>
              <a href="{% url 'task:tag-delete' tag.pk %}" class="btn btn-sm btn-outline-danger">
                Delete
              </a>
            </td>
          </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
{% endblock %}
